# ===== BASEBALL SIM — Codemagic iOS ビルド設定 =====
# 置き場所: リポジトリのルート（package.json と同じ階層）に codemagic.yml として置く。
# 共有schemeはビルド時に自動生成するので、手動でのファイル配置は不要です。

workflows:
  # --------------------------------------------------------------
  # A) 署名なしの動作確認ビルド（Apple Developer 登録なしでOK）
  #    まずこれで「CIでビルドが通るか」を無料で確認する
  # --------------------------------------------------------------
  ios-check:
    name: BASEBALL SIM - Build Check (unsigned)
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      node: 20.14.0
      xcode: latest
    scripts:
      - name: npm install
        script: npm install
      - name: Generate shared scheme (App)
        script: |
          mkdir -p ios/App/App.xcodeproj/xcshareddata/xcschemes
          echo "" | base64 --decode > ios/App/App.xcodeproj/xcshareddata/xcschemes/App.xcscheme
          echo "--- schemes ---"; ls -la ios/App/App.xcodeproj/xcshareddata/xcschemes
      - name: Capacitor sync (copy web assets to iOS)
        script: npx cap sync ios
      - name: Build (no code signing)
        script: |
          xcodebuild \
            -project "ios/App/App.xcodeproj" \
            -scheme "App" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

  # --------------------------------------------------------------
  # B) TestFlight 配信ビルド（実機テスト用・要 Apple Developer 設定）
  #    A が通ったら、前提を満たした上でこちらを使う
  # --------------------------------------------------------------
  ios-testflight:
    name: BASEBALL SIM - iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Codemagic の「Teams → Integrations → App Store Connect」で作った連携の名前に一致させる
      app_store_connect: AppStoreConnect
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.nakahomes.baseballsim
      node: 20.14.0
      xcode: latest
    scripts:
      - name: npm install
        script: npm install
      - name: Generate shared scheme (App)
        script: |
          mkdir -p ios/App/App.xcodeproj/xcshareddata/xcschemes
          echo "" | base64 --decode > ios/App/App.xcodeproj/xcshareddata/xcschemes/App.xcscheme
      - name: Capacitor sync (copy web assets to iOS)
        script: npx cap sync ios
      - name: Set build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all "$BUILD_NUMBER" || true
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
