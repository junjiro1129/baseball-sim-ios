# ===== BASEBALL SIM — iOS ビルド設定 =====
# 置き場所: リポジトリのルート（package.json と同じ階層）に codemagic.yaml として置く

workflows:

  ios-check:
    name: BASEBALL SIM - Build Check
    max_build_duration: 60
    environment:
      node: 22
      xcode: latest
    scripts:
      - name: npm install
        script: npm install
      - name: Generate shared scheme (App)
        script: |
          mkdir -p ios/App/App.xcodeproj/xcshareddata/xcschemes
          echo "" | base64 --decode > ios/App/App.xcodeproj/xcshareddata/xcschemes/App.xcscheme
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Build (no code signing)
        script: |
          xcodebuild -project "ios/App/App.xcodeproj" -scheme "App" -configuration Release -sdk iphoneos -destination "generic/platform=iOS" build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

  ios-testflight:
    name: BASEBALL SIM - iOS TestFlight
    max_build_duration: 90
    integrations:
      app_store_connect: AppStoreConnect
    environment:
      node: 22
      xcode: latest
    scripts:
      - name: npm install
        script: npm install
      - name: Generate shared scheme (App)
        script: |
          mkdir -p ios/App/App.xcodeproj/xcshareddata/xcschemes
          echo "" | base64 --decode > ios/App/App.xcodeproj/xcshareddata/xcschemes/App.xcscheme
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Fetch signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.nakahomes.baseballsim" --type IOS_APP_STORE --create --verbose
          keychain add-certificates
      - name: Apply manual signing to project
        script: |
          xcode-project use-profiles --project "$CM_BUILD_DIR/ios/App/App.xcodeproj" --warn-only
      - name: Set build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all "$BUILD_NUMBER" || true
      - name: Build IPA
        script: |
          xcode-project build-ipa --project "ios/App/App.xcodeproj" --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
